name: 🚀 Docker Build & Deploy to Aliyun ECS

# ============================================================
# 触发条件：推送到 main 分支时自动触发
# ============================================================
on:
  push:
    branches:
      - main
  workflow_dispatch:   # 也支持手动触发

# ============================================================
# 环境变量（修改此处即可，无需动其他地方）
# ============================================================
env:
  # Docker Hub 镜像名称（格式：用户名/仓库名）
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/todolist
  # 容器名称（ECS 上运行的容器叫这个名字）
  CONTAINER_NAME: todolist-app
  # 应用运行端口
  APP_PORT: 3000
  # MySQL 容器名称（ECS 上已有 MySQL 容器）
  MYSQL_CONTAINER: todolist-mysql

jobs:
  # ============================================================
  # Job 1：构建 Docker 镜像 并推送到 Docker Hub
  # ============================================================
  build-and-push:
    name: 🔨 Build & Push Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🔑 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 🏷️ 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: 🛠️ 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 启用 GitHub Actions 缓存，加快二次构建速度
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ 输出镜像信息
        run: |
          echo "镜像推送成功！"
          echo "镜像标签: ${{ steps.meta.outputs.tags }}"

  # ============================================================
  # Job 2：SSH 登录 ECS，拉取新镜像并重启容器
  # ============================================================
  deploy:
    name: 🚀 Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push   # 依赖上一个 job 成功后才执行

    steps:
      - name: 🔗 SSH 部署到阿里云 ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_ECS_IP }}
          username: ${{ secrets.ALIYUN_ECS_USERNAME }}
          key: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
          port: 22
          # SSH 连接超时时间
          timeout: 60s
          # 命令执行超时时间
          command_timeout: 10m
          script: |
            set -e   # 任意一步失败立即退出

            echo "=========================================="
            echo "🚀 开始部署 TodoList 应用"
            echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

            # ---------- 1. 登录 Docker Hub ----------
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            echo "✅ Docker Hub 登录成功"

            # ---------- 2. 拉取最新镜像 ----------
            echo "📥 拉取最新镜像..."
            docker pull ${{ env.IMAGE_NAME }}:latest
            echo "✅ 镜像拉取成功"

            # ---------- 3. 确保 MySQL 容器在运行 ----------
            if ! docker ps --format '{{.Names}}' | grep -q "^${{ env.MYSQL_CONTAINER }}$"; then
              echo "⚠️  MySQL 容器未运行，尝试启动..."
              docker start ${{ env.MYSQL_CONTAINER }} || \
                echo "❌ MySQL 容器不存在，请先按文档手动初始化数据库！"
            else
              echo "✅ MySQL 容器运行中"
            fi

            # ---------- 4. 停止并删除旧容器（如果存在）----------
            if docker ps -a --format '{{.Names}}' | grep -q "^${{ env.CONTAINER_NAME }}$"; then
              echo "🛑 停止旧容器..."
              docker stop ${{ env.CONTAINER_NAME }} || true
              docker rm   ${{ env.CONTAINER_NAME }} || true
              echo "✅ 旧容器已清除"
            fi

            # ---------- 5. 启动新容器 ----------
            echo "▶️  启动新容器..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart always \
              --network todolist-net \
              -p ${{ env.APP_PORT }}:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e DB_HOST=todolist-mysql \
              -e DB_PORT=3306 \
              -e DB_USER=todouser \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=todolist \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              ${{ env.IMAGE_NAME }}:latest

            echo "✅ 新容器启动成功"

            # ---------- 6. 健康检查（等待服务就绪）----------
            echo "🔍 等待服务启动..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:${{ env.APP_PORT }}/ > /dev/null 2>&1; then
                echo "✅ 服务已就绪（第 ${i} 次检查通过）"
                break
              fi
              echo "   第 ${i} 次检查... 等待 3 秒"
              sleep 3
            done

            # ---------- 7. 输出容器状态 ----------
            echo ""
            echo "=========================================="
            echo "📊 容器运行状态"
            echo "=========================================="
            docker ps --filter "name=${{ env.CONTAINER_NAME }}" \
              --format "表格\t{{.Names}}\t{{.Status}}\t{{.Ports}}"

            # ---------- 8. 清理旧镜像已跳过（ECS 无法访问外部 registry）----------

            echo ""
            echo "=========================================="
            echo "🎉 部署成功！访问地址：http://${{ secrets.ALIYUN_ECS_IP }}:${{ env.APP_PORT }}"
            echo "=========================================="
