name: 🚀 Docker Build & Deploy to Aliyun ECS

# ============================================================
# 触发条件：推送到 main 分支时自动触发
# ============================================================
on:
  push:
    branches:
      - main
  workflow_dispatch:   # 也支持手动触发

# ============================================================
# 环境变量
# ============================================================
env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/todolist
  CONTAINER_NAME: todolist-app
  APP_PORT: 3000
  MYSQL_CONTAINER: todolist-mysql

jobs:
  # ============================================================
  # Job 1：构建镜像 → 推 Docker Hub（备份）→ 保存 tar.gz → 上传 Artifact
  # ============================================================
  build-and-push:
    name: 🔨 Build & Push & Save
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🔑 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 🏷️ 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: 🛠️ 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 构建并推送镜像（Docker Hub 备份）
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📥 拉取镜像到本地（buildx 构建的镜像不在本地 docker 中）
        run: |
          docker pull ${{ env.IMAGE_NAME }}:latest
          echo "✅ 镜像已加载到本地 Docker"

      - name: 💾 导出镜像为压缩包
        run: |
          docker save ${{ env.IMAGE_NAME }}:latest | gzip > todolist-image.tar.gz
          echo "📦 压缩包大小: $(du -h todolist-image.tar.gz | cut -f1)"

      - name: 📤 上传镜像到 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: todolist-image
          path: todolist-image.tar.gz
          retention-days: 1

  # ============================================================
  # Job 2：下载 Artifact → SCP 传镜像到 ECS → docker load → 运行
  # ============================================================
  deploy:
    name: 🚀 Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: 📥 下载镜像 Artifact
        uses: actions/download-artifact@v4
        with:
          name: todolist-image

      - name: 📤 SCP 传输镜像到 ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_ECS_IP }}
          username: ${{ secrets.ALIYUN_ECS_USERNAME }}
          key: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
          port: 22
          source: todolist-image.tar.gz
          target: /tmp/
          timeout: 300s

      - name: 🚀 加载镜像并启动容器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_ECS_IP }}
          username: ${{ secrets.ALIYUN_ECS_USERNAME }}
          key: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script: |
            echo "=========================================="
            echo "🚀 开始部署 TodoList 应用"
            echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "=========================================="

            # ---------- 1. 加载镜像 ----------
            echo "📥 加载 Docker 镜像..."
            docker load < /tmp/todolist-image.tar.gz
            echo "✅ 镜像加载完成"

            # ---------- 2. 确保 MySQL 容器运行 ----------
            if ! docker ps --format '{{.Names}}' | grep -q "^${{ env.MYSQL_CONTAINER }}$"; then
              echo "⚠️  MySQL 容器未运行，尝试启动..."
              docker start ${{ env.MYSQL_CONTAINER }} 2>/dev/null || \
                echo "❌ MySQL 容器不存在，跳过"
            else
              echo "✅ MySQL 容器运行中"
            fi

            # ---------- 3. 停止并删除旧容器 ----------
            if docker ps -a --format '{{.Names}}' | grep -q "^${{ env.CONTAINER_NAME }}$"; then
              echo "🛑 停止旧容器..."
              docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
              docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true
              echo "✅ 旧容器已清除"
            fi

            # ---------- 4. 启动新容器 ----------
            echo "▶️  启动新容器..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart always \
              --network todolist-net \
              -p ${{ env.APP_PORT }}:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e DB_HOST=${{ env.MYSQL_CONTAINER }} \
              -e DB_PORT=3306 \
              -e DB_USER=todouser \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_NAME=todolist \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              ${{ env.IMAGE_NAME }}:latest

            echo "✅ 新容器启动成功"

            # ---------- 5. 健康检查 ----------
            echo "🔍 等待服务启动..."
            for i in $(seq 1 20); do
              if curl -sf http://localhost:${{ env.APP_PORT }}/ > /dev/null 2>&1; then
                echo "✅ 服务已就绪（第 ${i} 次检查通过）"
                break
              fi
              echo "   第 ${i} 次检查... 等待 3 秒"
              sleep 3
            done

            # ---------- 6. 容器状态 + 日志（关键：方便排查） ----------
            echo ""
            echo "=========================================="
            echo "📊 容器运行状态"
            echo "=========================================="
            docker ps -a --filter "name=${{ env.CONTAINER_NAME }}" \
              --format "{{.Names}} | {{.Status}} | {{.Ports}}"

            echo ""
            echo "=========================================="
            echo "📋 应用启动日志（最近50行）"
            echo "=========================================="
            docker logs ${{ env.CONTAINER_NAME }} --tail 50 2>&1

            # ---------- 7. 清理临时文件 ----------
            rm -f /tmp/todolist-image.tar.gz
            echo "🧹 临时文件已清理"

            echo ""
            echo "=========================================="
            echo "🎉 部署成功！访问地址：http://${{ secrets.ALIYUN_ECS_IP }}:${{ env.APP_PORT }}"
            echo "=========================================="
