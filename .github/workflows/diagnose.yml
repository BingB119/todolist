name: 🔍 ECS 诊断

on:
  workflow_dispatch:  # 手动触发

jobs:
  diagnose:
    name: 🔍 远程诊断
    runs-on: ubuntu-latest
    steps:
      - name: SSH 诊断 ECS 状态
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_ECS_IP }}
          username: ${{ secrets.ALIYUN_ECS_USERNAME }}
          key: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 2m
          script: |
            echo "===== 1. 所有容器状态 ====="
            docker ps -a --format "{{.Names}} | {{.Status}} | {{.Ports}}"

            echo ""
            echo "===== 2. todolist-app 日志 ====="
            docker logs todolist-app --tail 60 2>&1 || echo "容器不存在或无日志"

            echo ""
            echo "===== 3. todolist-mysql 日志 ====="
            docker logs todolist-mysql --tail 20 2>&1 || echo "MySQL 容器不存在"

            echo ""
            echo "===== 4. 端口监听 ====="
            ss -tlnp | grep -E "3000|3306" || echo "未找到监听端口"

            echo ""
            echo "===== 5. 本地 curl 测试 ====="
            curl -sv http://localhost:3000/ 2>&1 | tail -20 || echo "curl 失败"

            echo ""
            echo "===== 6. Docker 网络 ====="
            docker network inspect todolist-net 2>&1 | grep -E "Name|IPv4|Containers" | head -20
